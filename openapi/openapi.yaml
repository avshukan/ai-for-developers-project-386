openapi: 3.0.0
info:
  title: Call Booking API
  version: 0.0.0
tags: []
paths:
  /bookings:
    post:
      operationId: createBooking
      summary: Create booking
      description: Creates a booking for a selected slot. Double booking must be prevented across all event types.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
        '400':
          description: Returned when request validation fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Returned when a requested resource does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
        '409':
          description: Returned when the selected slot is already booked or overlaps another booking.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingConflictResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBookingRequest'
  /event-types:
    get:
      operationId: listEventTypes
      summary: List event types
      description: Returns all event types visible to guests.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventType'
              example:
                - id: evt_intro
                  title: Intro call
                  description: A 30-minute introduction call.
                  durationMinutes: 30
                - id: evt_strategy
                  title: Strategy session
                  description: Discuss your project roadmap.
                  durationMinutes: 30
  /event-types/{eventTypeId}/slots:
    get:
      operationId: listSlots
      summary: List available slots
      description: Returns available 30-minute slots within the next 14 days. Slots are global across all event types; eventTypeId only validates that the event type exists and scopes the guest flow, it does not filter the slots.
      parameters:
        - name: eventTypeId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Slot'
              example:
                - startAt: '2026-06-24T09:00:00Z'
                  endAt: '2026-06-24T09:30:00Z'
                  status: available
                - startAt: '2026-06-24T09:30:00Z'
                  endAt: '2026-06-24T10:00:00Z'
                  status: available
                - startAt: '2026-06-24T10:00:00Z'
                  endAt: '2026-06-24T10:30:00Z'
                  status: available
                - startAt: '2026-06-25T14:00:00Z'
                  endAt: '2026-06-25T14:30:00Z'
                  status: available
                - startAt: '2026-06-25T14:30:00Z'
                  endAt: '2026-06-25T15:00:00Z'
                  status: available
        '404':
          description: Returned when a requested resource does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundErrorResponse'
  /host/availability:
    post:
      operationId: createAvailability
      summary: Create availability
      description: Creates a host availability range. The range is later split into 30-minute slots.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Availability'
        '400':
          description: Returned when request validation fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAvailabilityRequest'
  /host/bookings:
    get:
      operationId: listHostBookings
      summary: List host bookings
      description: Returns upcoming bookings across all event types. Host pages are public in the MVP.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Booking'
              example:
                - id: bkg_1
                  eventTypeId: evt_intro
                  startAt: '2026-06-24T09:00:00Z'
                  endAt: '2026-06-24T09:30:00Z'
                  guestName: Jane Doe
                  guestEmail: jane@example.com
                  createdAt: '2026-06-23T08:30:00Z'
                - id: bkg_2
                  eventTypeId: evt_strategy
                  startAt: '2026-06-25T14:00:00Z'
                  endAt: '2026-06-25T14:30:00Z'
                  guestName: Sam Lee
                  guestEmail: sam@example.com
                  createdAt: '2026-06-23T09:00:00Z'
  /host/event-types:
    post:
      operationId: createEventType
      summary: Create event type
      description: Creates a new event type. Host pages are public in the MVP.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventType'
        '400':
          description: Returned when request validation fails.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventTypeRequest'
components:
  schemas:
    Availability:
      type: object
      required:
        - id
        - startAt
        - endAt
        - createdAt
      properties:
        id:
          type: string
          description: System-generated availability id.
        startAt:
          type: string
          format: date-time
          description: Availability start time in UTC.
        endAt:
          type: string
          format: date-time
          description: Availability end time in UTC.
        createdAt:
          type: string
          format: date-time
          description: Creation time in UTC.
      description: A time range published by the host.
      example:
        id: avl_1
        startAt: '2026-06-24T09:00:00Z'
        endAt: '2026-06-24T12:00:00Z'
        createdAt: '2026-06-23T08:00:00Z'
    Booking:
      type: object
      required:
        - id
        - eventTypeId
        - startAt
        - endAt
        - guestName
        - guestEmail
        - createdAt
      properties:
        id:
          type: string
          description: System-generated booking id.
        eventTypeId:
          type: string
        startAt:
          type: string
          format: date-time
          description: Booking start time in UTC.
        endAt:
          type: string
          format: date-time
          description: Booking end time in UTC.
        guestName:
          type: string
          minLength: 1
        guestEmail:
          type: string
          format: email
        createdAt:
          type: string
          format: date-time
          description: Creation time in UTC.
      description: A confirmed booking created by a guest.
      example:
        id: bkg_1
        eventTypeId: evt_intro
        startAt: '2026-06-24T09:00:00Z'
        endAt: '2026-06-24T09:30:00Z'
        guestName: Jane Doe
        guestEmail: jane@example.com
        createdAt: '2026-06-23T08:30:00Z'
    BookingConflictResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - booking_conflict
        message:
          type: string
      description: Returned when the selected slot is already booked or overlaps another booking.
      example:
        statusCode: 409
        code: booking_conflict
        message: That time was just booked. Please choose another slot.
    CreateAvailabilityRequest:
      type: object
      required:
        - startAt
        - endAt
      properties:
        startAt:
          type: string
          format: date-time
          description: Availability start time in UTC.
        endAt:
          type: string
          format: date-time
          description: Availability end time in UTC.
      description: Request body for creating an availability range.
    CreateBookingRequest:
      type: object
      required:
        - eventTypeId
        - startAt
        - guestName
        - guestEmail
      properties:
        eventTypeId:
          type: string
        startAt:
          type: string
          format: date-time
          description: Selected slot start time in UTC. The backend calculates endAt as startAt plus 30 minutes.
        guestName:
          type: string
          minLength: 1
        guestEmail:
          type: string
          format: email
      description: Request body for creating a booking.
    CreateEventTypeRequest:
      type: object
      required:
        - title
        - description
        - durationMinutes
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        durationMinutes:
          type: integer
          format: int32
          minimum: 30
          maximum: 30
          description: Must be 30 in the MVP.
      description: Request body for creating an event type.
    EventType:
      type: object
      required:
        - id
        - title
        - description
        - durationMinutes
      properties:
        id:
          type: string
          description: System-generated event type id.
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        durationMinutes:
          type: integer
          format: int32
          minimum: 30
          maximum: 30
          description: Fixed to 30 minutes in the MVP.
      description: A bookable meeting type created by the host.
      example:
        id: evt_intro
        title: Intro call
        description: A 30-minute introduction call.
        durationMinutes: 30
    NotFoundErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - not_found
        message:
          type: string
      description: Returned when a requested resource does not exist.
      example:
        statusCode: 404
        code: not_found
        message: Event type not found.
    Slot:
      type: object
      required:
        - startAt
        - endAt
        - status
      properties:
        startAt:
          type: string
          format: date-time
          description: Slot start time in UTC.
        endAt:
          type: string
          format: date-time
          description: Slot end time in UTC.
        status:
          $ref: '#/components/schemas/SlotStatus'
      description: A 30-minute slot derived from host availability.
      example:
        startAt: '2026-06-24T09:00:00Z'
        endAt: '2026-06-24T09:30:00Z'
        status: available
    SlotStatus:
      type: string
      enum:
        - available
        - booked
    ValidationErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          enum:
            - validation_error
        message:
          type: string
        details:
          type: array
          items:
            type: string
      description: Returned when request validation fails.
      example:
        statusCode: 400
        code: validation_error
        message: Request validation failed.
        details:
          - title must not be empty
          - guestEmail must be a valid email
servers:
  - url: http://localhost:8080
    description: Local development server
    variables: {}
  - url: https://call-booking-66ez.onrender.com
    description: Production (Render)
    variables: {}
